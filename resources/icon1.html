  <style>
    .name {
      color: #ffffff;
      font-size: 100px;
      font-weight: bold;
      /* font-family: 'Lobster', cursive; */
      /* font-family: 'Pacifico', cursive; */
      /* font-family: 'Raleway', sans-serif; */
      /* font-family: 'Playfair Display', serif; */
      /* font-family: 'Poppins', sans-serif; */
      /* font-family: 'Lato', sans-serif; */

      /* font-family: 'Quicksand', sans-serif; */
      /* font-family: 'Ubuntu', sans-serif; */
      /* font-family: 'Muli', sans-serif; */
      /* font-family: 'Source Sans Pro', sans-serif; */
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      font-weight: normal;
    }

    .social-box {
      height: 100vh;
      /* background: linear-gradient(135deg, #7899cc 20%, #3e63dd 80%); */
      /* background: linear-gradient(135deg, #7899cc 10%, #5a7583 30%, #bb9854 50%, #ab4378 70%, #799978 90%); */
      /* background: linear-gradient(135deg, #7899cc 15%, #5a7583 32.5%, #bb9854 50%, #ab4378 67.5%, #799978 85%); */
      /* background: linear-gradient(135deg, #ffffff 20%, #1b1b1f 80%); */
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .content-box {
      display: flex;
      align-items: center;
      flex-direction: column;
    }

    .logo {
      width: 220px;
      height: 220px;
      display: flex;
      justify-content: center;
      align-items: center;
      /* background: #f5f5f5; */
      /* 可选：让空白区域更明显 */
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      /* 关键：保持比例完整显示 */
    }
  </style>
